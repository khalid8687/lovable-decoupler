name: Deploy to Surge

on:
  repository_dispatch:
    types: [deploy]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download and extract ZIP
        run: |
          curl -L --retry 3 --max-time 120 -o project.zip "${{ github.event.client_payload.zip_url }}"
          mkdir -p project_raw
          unzip -q project.zip -d project_raw/
          PACKAGE_JSON=$(find project_raw -name package.json -not -path '*/node_modules/*' | sort | head -1)
          echo "PROJECT_DIR=$(dirname $PACKAGE_JSON)" >> $GITHUB_ENV

      - name: Clean and Decouple Lovable Project
        run: |
          node scripts/decouple.js "$PROJECT_DIR"

      - name: Install dependencies
        run: |
          cd "$PROJECT_DIR"
          npm install --legacy-peer-deps

      - name: Build project
        run: |
          cd "$PROJECT_DIR"
          npm run build

      - name: Detect deploy directory and add 200.html
        run: |
          DEPLOY_DIR=""
          for d in "$PROJECT_DIR/dist/client" "$PROJECT_DIR/dist" "$PROJECT_DIR/build" "$PROJECT_DIR/out"; do
            if [ -d "$d" ] && [ -f "$d/index.html" ]; then
              DEPLOY_DIR="$d"
              echo "DEPLOY_DIR=$d" >> $GITHUB_ENV
              echo "Deploy directory: $d"
              break
            fi
          done
          if [ -z "$DEPLOY_DIR" ]; then
            echo "ERROR: No build output with index.html found!"
            ls -la "$PROJECT_DIR/"
            find "$PROJECT_DIR" -name index.html -not -path '*/node_modules/*' | head -10
            exit 1
          fi
          cp "$DEPLOY_DIR/index.html" "$DEPLOY_DIR/200.html"
          echo "Added 200.html for SPA routing"

      - name: Deploy to Surge
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          npm install -g surge
          SUB="decoupled-$(head /dev/urandom | tr -dc a-z0-9 | head -c 6)"
          surge "$DEPLOY_DIR" "$SUB.surge.sh" --token "$SURGE_TOKEN"
          echo "SURGE_URL=https://$SUB.surge.sh" >> $GITHUB_ENV

      - name: Write result to results branch
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin results 2>/dev/null && git checkout results || git checkout --orphan results
          git rm -rf . 2>/dev/null || true
          echo "$SURGE_URL" > "result-${{ github.event.client_payload.run_token }}.txt"
          git add . && git commit -m "Result: $SURGE_URL"
          git push origin results --force-with-lease 2>/dev/null || git push origin results
