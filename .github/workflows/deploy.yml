name: Deploy to Surge

on:
  repository_dispatch:
    types: [deploy]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download and extract ZIP
        run: |
          curl -L --retry 3 --max-time 120 -o project.zip "${{ github.event.client_payload.zip_url }}"
          mkdir -p project_raw
          unzip -q project.zip -d project_raw/
          PACKAGE_JSON=$(find project_raw -name package.json -not -path '*/node_modules/*' | sort | head -1)
          echo "PROJECT_DIR=$(dirname $PACKAGE_JSON)" >> $GITHUB_ENV

      - name: Clean Lovable references
        run: |
          cd "$PROJECT_DIR"
          for f in .lovable bun.lock bunfig.toml AGENTS.md src/lib/lovable-error-reporting.ts; do
            [ -e "$f" ] && rm -rf "$f" && echo "Deleted: $f" || true
          done
          node << 'JSEOF'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          let changed = false;
          ['dependencies', 'devDependencies'].forEach(k => {
            if (!pkg[k]) return;
            Object.keys(pkg[k]).filter(p => p.startsWith('@lovable.dev')).forEach(p => {
              delete pkg[k][p];
              changed = true;
              console.log('Removed package dependency: ' + p);
            });
          });
          if (!pkg.devDependencies) pkg.devDependencies = {};
          if (!pkg.devDependencies['@vitejs/plugin-react'] && !pkg.dependencies?.['@vitejs/plugin-react']) {
            pkg.devDependencies['@vitejs/plugin-react'] = '^4.0.0';
            changed = true;
            console.log('Added @vitejs/plugin-react');
          }
          if (changed) {
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          }
          JSEOF

      - name: Replace Lovable vite.config if needed
        run: |
          cd "$PROJECT_DIR"
          node << 'JSEOF'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const isTanstack = (pkg.dependencies && pkg.dependencies['@tanstack/react-start']) || 
                             (pkg.devDependencies && pkg.devDependencies['@tanstack/react-start']);
          
          const configFiles = ['vite.config.ts', 'vite.config.js'];
          let configFile = configFiles.find(f => fs.existsSync(f));
          if (!configFile) configFile = 'vite.config.ts';
          
          let needsReplacement = true;
          if (fs.existsSync(configFile)) {
            const content = fs.readFileSync(configFile, 'utf8');
            needsReplacement = content.includes('@lovable.dev');
          }
          
          if (needsReplacement) {
            console.log('Replacing config file ' + configFile + ' (isTanstack: ' + !!isTanstack + ')...');
            let newConfig = '';
            if (isTanstack) {
              newConfig = `import { defineConfig } from "vite";
import { tanstackStart } from "@tanstack/react-start/plugin/vite";
import viteReact from "@vitejs/plugin-react";
import tsConfigPaths from "vite-tsconfig-paths";
import tailwindcss from "@tailwindcss/vite";

export default defineConfig({
  plugins: [
    tsConfigPaths({ projects: ["./tsconfig.json"] }),
    tanstackStart({
      server: { entry: "server" },
      prerender: {
        enabled: true,
      },
    }),
    viteReact(),
    tailwindcss(),
  ],
});`;
            } else {
              newConfig = `import { defineConfig } from "vite";
import react from "@vitejs/plugin-react";
import path from "path";
export default defineConfig({
  plugins: [react()],
  resolve: { alias: { "@": path.resolve(__dirname, "./src") } },
  build: { outDir: "dist" },
});`;
            }
            fs.writeFileSync(configFile, newConfig, 'utf8');
            console.log('Successfully replaced vite config!');
          } else {
            console.log('vite config does not use Lovable, keeping as-is.');
          }
          JSEOF

      - name: Clean __root.tsx
        run: |
          cd "$PROJECT_DIR"
          if [ -f "src/routes/__root.tsx" ]; then
            node << 'JSEOF'
            const fs = require('fs');
            let c = fs.readFileSync('src/routes/__root.tsx', 'utf8');
            const before = c;
            c = c.replace('import { reportLovableError } from "../lib/lovable-error-reporting";', '');
            c = c.replace(/useEffect\(\s*\(\)\s*=>\s*\{\s*reportLovableError\([^)]*\);\s*\}\s*,\s*\[error\]\s*\);?/g, '');
            if (c !== before) {
              fs.writeFileSync('src/routes/__root.tsx', c);
              console.log('Cleaned __root.tsx');
            }
            JSEOF
          fi

      - name: Install dependencies
        run: |
          cd "$PROJECT_DIR"
          npm install --legacy-peer-deps

      - name: Build project
        run: |
          cd "$PROJECT_DIR"
          npm run build

      - name: Detect deploy directory and add 200.html
        run: |
          for d in "$PROJECT_DIR/dist/client" "$PROJECT_DIR/dist" "$PROJECT_DIR/build" "$PROJECT_DIR/out"; do
            if [ -d "$d" ] && [ -f "$d/index.html" ]; then
              echo "DEPLOY_DIR=$d" >> $GITHUB_ENV
              echo "Deploy directory: $d"
              break
            fi
          done
          if [ -z "$DEPLOY_DIR" ]; then
            echo "ERROR: No build output with index.html found!"
            ls -la "$PROJECT_DIR/"
            find "$PROJECT_DIR" -name index.html -not -path '*/node_modules/*' | head -10
            exit 1
          fi
          cp "$DEPLOY_DIR/index.html" "$DEPLOY_DIR/200.html"
          echo "Added 200.html for SPA routing"

      - name: Deploy to Surge
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          npm install -g surge
          SUB="decoupled-$(head /dev/urandom | tr -dc a-z0-9 | head -c 6)"
          surge "$DEPLOY_DIR" "$SUB.surge.sh" --token "$SURGE_TOKEN"
          echo "SURGE_URL=https://$SUB.surge.sh" >> $GITHUB_ENV

      - name: Write result to results branch
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin results 2>/dev/null && git checkout results || git checkout --orphan results
          git rm -rf . 2>/dev/null || true
          echo "$SURGE_URL" > "result-${{ github.event.client_payload.run_token }}.txt"
          git add . && git commit -m "Result: $SURGE_URL"
          git push origin results --force-with-lease 2>/dev/null || git push origin results
