name: Deploy to Surge

on:
  repository_dispatch:
    types: [deploy]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download and extract ZIP
        run: |
          curl -L --retry 3 --max-time 120 -o project.zip "${{ github.event.client_payload.zip_url }}"
          mkdir -p project_raw
          unzip -q project.zip -d project_raw/
          PACKAGE_JSON=$(find project_raw -name package.json -not -path '*/node_modules/*' | sort | head -1)
          echo "PROJECT_DIR=$(dirname $PACKAGE_JSON)" >> $GITHUB_ENV

      - name: Remove Lovable packages from package.json
        run: |
          cd "$PROJECT_DIR"
          for f in .lovable bun.lock bunfig.toml AGENTS.md src/lib/lovable-error-reporting.ts; do
            [ -e "$f" ] && rm -rf "$f" && echo "Deleted: $f" || true
          done
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));['dependencies','devDependencies'].forEach(k=>{if(!p[k])return;Object.keys(p[k]).filter(x=>x.startsWith('@lovable.dev')).forEach(x=>{delete p[k][x];console.log('Removed '+x)})});if(!p.devDependencies)p.devDependencies={};if(!p.devDependencies['@vitejs/plugin-react']&&!p.dependencies?.['@vitejs/plugin-react'])p.devDependencies['@vitejs/plugin-react']='^4.0.0';fs.writeFileSync('package.json',JSON.stringify(p,null,2))"

      - name: Replace Lovable vite config
        run: |
          cd "$PROJECT_DIR"
          for cfg in vite.config.ts vite.config.js; do
            if [ -f "$cfg" ] && grep -q '@lovable.dev' "$cfg"; then
              printf 'import { defineConfig } from "vite";\nimport react from "@vitejs/plugin-react";\nimport path from "path";\nexport default defineConfig({\n  plugins: [react()],\n  resolve: { alias: { "@": path.resolve(__dirname, "./src") } },\n  build: { outDir: "dist" },\n});\n' > "$cfg"
              echo "Replaced $cfg"
            fi
          done

      - name: Install dependencies
        run: |
          cd "$PROJECT_DIR"
          npm install --legacy-peer-deps

      - name: Build
        run: |
          cd "$PROJECT_DIR"
          npm run build

      - name: Find build output
        run: |
          for d in "$PROJECT_DIR/dist/client" "$PROJECT_DIR/dist" "$PROJECT_DIR/build" "$PROJECT_DIR/out"; do
            if [ -d "$d" ] && [ -f "$d/index.html" ]; then
              echo "DEPLOY_DIR=$d" >> $GITHUB_ENV && echo "Deploy dir: $d" && break
            fi
          done
          if [ -z "$DEPLOY_DIR" ]; then
            echo "No build output found!" && ls -la "$PROJECT_DIR/" && exit 1
          fi
          cp "$DEPLOY_DIR/index.html" "$DEPLOY_DIR/200.html"

      - name: Deploy to Surge
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          npm install -g surge
          SUB="decoupled-$(head /dev/urandom | tr -dc a-z0-9 | head -c 6)"
          surge "$DEPLOY_DIR" "$SUB.surge.sh" --token "$SURGE_TOKEN"
          echo "SURGE_URL=https://$SUB.surge.sh" >> $GITHUB_ENV

      - name: Write result
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin results 2>/dev/null && git checkout results || git checkout --orphan results
          git rm -rf . 2>/dev/null || true
          echo "$SURGE_URL" > "result-${{ github.event.client_payload.run_token }}.txt"
          git add . && git commit -m "Result: $SURGE_URL"
          git push origin results --force-with-lease 2>/dev/null || git push origin results
